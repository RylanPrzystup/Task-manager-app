<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="task1.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Task Manager</h1>
            <input type="text" id="taskInput" placeholder="Enter a new task..." required />
            <button onclick="addTask()">Add Task</button>
    </div>
        <div class="results" id="taskList">
            <h2>Tasks</h2>
            <ul id="taskList"></ul>
        </div>
        <button class="reset-btn" onclick="clearTasks()">Clear All Tasks</button><!-- Calls the clearTasks Function -->
    </div>
</body>
</html>

</body>
</html>
